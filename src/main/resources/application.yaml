spring:
  application:
    name: personal-finance-manager

  datasource:
    url: jdbc:mysql://localhost:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: viki@12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# JWT (custom properties – OK to keep separate)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-min-32-chars-for-hs256}
  expiration-ms: ${JWT_EXPIRATION_MS:36000000}

server:
  port: 9006

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
